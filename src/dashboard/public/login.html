<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Qoder Proxy — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--surface:#12121e;--card:#1a1a2c;
  --accent:#8b5cf6;--accent2:#6d28d9;
  --border:rgba(255,255,255,0.07);
  --text1:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --error:#ef4444;--success:#10b981;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(139,92,246,0.18),transparent);pointer-events:none}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.5);position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;flex-shrink:0}
.logo-text{font-size:15px;font-weight:600;color:var(--text1)}
.logo-sub{font-size:12px;color:var(--text2)}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:28px}
.field{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase}
input[type=password]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text1);border-radius:8px;padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
input[type=password]:focus{border-color:var(--accent)}
input[type=password]::placeholder{color:var(--text3)}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s,box-shadow .2s;box-shadow:0 0 0 rgba(139,92,246,0)}
.btn:hover{opacity:.9;box-shadow:0 0 24px rgba(139,92,246,0.35)}
.error-msg{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:16px;display:none}
.error-msg.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">Q</div>
    <div><div class="logo-text">Qoder Proxy</div><div class="logo-sub">Dashboard</div></div>
  </div>
  <h1>Sign In</h1>
  <p class="subtitle">Enter your dashboard password to continue</p>
  <div class="error-msg" id="err">Incorrect password. Please try again.</div>
  <form method="POST" action="/dashboard/login">
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" id="pw" autofocus placeholder="••••••••••••" required>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
<script>
  if(new URLSearchParams(location.search).get('error')==='1'){
    document.getElementById('err').classList.add('show');
  }
</script>
</body>
</html>
