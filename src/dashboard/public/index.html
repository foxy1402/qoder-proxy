<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Qoder Proxy Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">Q</div>
      <div class="logo-text-wrap">
        <span class="logo-name">Qoder Proxy</span>
        <span class="logo-tag">Dashboard</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#endpoints"   class="nav-item" data-page="endpoints">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Endpoints
      </a>
      <a href="#playground"  class="nav-item" data-page="playground">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Playground
      </a>
      <a href="#logs"        class="nav-item" data-page="logs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>
        Request Logs
        <span class="nav-badge" id="nav-log-count"></span>
      </a>
      <a href="#system-logs" class="nav-item" data-page="system-logs">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8l2 2-2 2m5 0h2"/></svg>
        System Logs
        <span class="nav-badge nav-badge-warn" id="nav-sys-count"></span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-version" class="version-tag"></span>
      <a href="/dashboard/logout" class="logout-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div id="main">
    <header id="topbar">
      <div class="topbar-left">
        <div id="status-indicator" class="status-dot status-unknown"></div>
        <span id="status-label" class="status-label">Checking…</span>
        <span class="sep">·</span>
        <span id="qodercli-ver" class="topbar-meta"></span>
        <span class="sep">·</span>
        <span id="uptime-label" class="topbar-meta"></span>
        <span class="sep">·</span>
        <span id="mem-label" class="topbar-meta"></span>
      </div>
    </header>
    <main id="content">
      <div class="loading-screen"><div class="spinner"></div></div>
    </main>
  </div>
</div>
<script src="/dashboard/static/app.js"></script>
</body>
</html>
